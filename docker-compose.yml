version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: transitops_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-transitops}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: transitops_redis
    restart: always
    ports:
      - "6379:6379"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: transitops_api
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-transitops}
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=transitops_super_secret_jwt_key_2026
      - JWT_ACCESS_EXPIRE_MINUTES=30
      - JWT_REFRESH_EXPIRE_DAYS=7
      - CORS_ORIGINS=http://localhost,http://localhost:4200,http://localhost:80
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: transitops_worker
    command: celery -A app.core.celery worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-transitops}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: transitops_web
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pgdata:
