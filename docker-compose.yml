version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: fleet_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fleet_management
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: fleet_redis
    restart: always
    ports:
      - "6379:6379"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fleet_backend
    restart: always
    environment:
      - APP_NAME=Core Fleet Management API
      - ENV=development
      - DEBUG=true
      - SECRET_KEY=supersecretjwtkeythatis32byteslongatleastforsecurity123!
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/fleet_management
      - REDIS_HOST=redis
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fleet_celery_worker
    restart: always
    command: ["celery", "-A", "app.jobs.celery_app", "worker", "--loglevel=info"]
    environment:
      - APP_NAME=Core Fleet Management API
      - ENV=development
      - DEBUG=true
      - SECRET_KEY=supersecretjwtkeythatis32byteslongatleastforsecurity123!
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/fleet_management
      - REDIS_HOST=redis
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - db
      - redis

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fleet_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:
